name: Sentinel Daily Briefing

# Hermes 为主力执行平台，GitHub Actions 仅保留手动触发作为兜底
# 自动定时已关闭，如需手动运行：Actions → Run workflow → 选择 mode 和 target

on:
  # 定时已关闭，由 Hermes Cron 代替
  # schedule:
  #   - cron: "10 23 * * 0-4" # Morning Brief
  #   - cron: "50 1 * * 1-5"  # Midday Check
  #   - cron: "5 4 * * 1-5"   # Preclose Execution
  #   - cron: "35 6 * * 1-5"  # Close Review
  #   - cron: "0 12 * * 1-5"  # Swing Strategy

  # 仅保留手动触发作为兜底
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "swing"
        type: choice
        options:
          - swing
          - morning
          - midday
          - preclose
          - close
          - auto
      publish_target:
        description: "Publish target"
        required: true
        default: "telegram"
        type: choice
        options:
          - feishu
          - telegram

jobs:
  run-sentinel:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Sentinel (Auto Detect Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_MODE: ${{ github.event.inputs.mode || 'auto' }}
          PUBLISH_TARGET: ${{ github.event.inputs.publish_target || 'telegram' }}
          SCHEDULE_EXPR: ${{ github.event.schedule || '' }}
        run: |
          if [ -n "$WORKFLOW_MODE" ] && [ "$WORKFLOW_MODE" != "auto" ]; then
            TARGET_MODE="$WORKFLOW_MODE"
            echo "Manual dispatch mode selected: $TARGET_MODE"
          else
            case "$SCHEDULE_EXPR" in
              "10 23 * * 0-4")
                TARGET_MODE="morning"
                ;;
              "50 1 * * 1-5")
                TARGET_MODE="midday"
                ;;
              "5 4 * * 1-5")
                TARGET_MODE="preclose"
                ;;
              "35 6 * * 1-5")
                TARGET_MODE="close"
                ;;
              "0 12 * * 1-5")
                TARGET_MODE="swing"
                ;;
              *)
                current_hour=$(date +%-H)
                current_minute=$(date +%-M)
                current_total_minutes=$((10#$current_hour * 60 + 10#$current_minute))
                echo "Current CST Time: ${current_hour}:${current_minute}"
                if [ "$current_total_minutes" -lt 280 ]; then
                  TARGET_MODE="morning"
                elif [ "$current_total_minutes" -lt 415 ]; then
                  TARGET_MODE="midday"
                elif [ "$current_total_minutes" -lt 450 ]; then
                  TARGET_MODE="preclose"
                elif [ "$current_total_minutes" -lt 930 ]; then
                  TARGET_MODE="close"
                else
                  TARGET_MODE="swing"
                fi
                ;;
            esac
          fi

          echo "Resolved mode: $TARGET_MODE"
          echo "Publish target: $PUBLISH_TARGET"

          if python -m src.utils.trading_calendar --mode "$TARGET_MODE" --publish; then
            python -m src.main --mode "$TARGET_MODE" --publish --publish-target "$PUBLISH_TARGET"
          else
            status=$?
            if [ "$status" -eq 78 ]; then
              echo "Skip run: non-trading day"
              exit 0
            fi
            exit "$status"
          fi

      - name: Commit Database Changes (Persistence)
        if: success()
        run: |
          git config --global user.name 'Sentinel Bot'
          git config --global user.email 'bot@sentinel.ai'

          git add -f data/sentinel.db

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Update market data: $(date +'%Y-%m-%d')"
            git push
          fi

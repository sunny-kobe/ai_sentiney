name: Sentinel Daily Briefing

on:
  schedule:
    # UTC Time! China is UTC+8.
    # OpenClaw 本地为主力，GitHub Actions 延后10分钟作为兜底
    # Morning 08:10 CST = 00:10 UTC
    # Midday 11:50 CST = 03:50 UTC
    # Close 15:20 CST = 07:20 UTC
    # Swing 15:35 CST = 07:35 UTC
    - cron: "10 0 * * 1-5" # Morning Brief (兜底)
    - cron: "50 3 * * 1-5" # Midday Check (兜底)
    - cron: "20 7 * * 1-5" # Close Review (兜底)
    - cron: "35 7 * * 1-5" # Swing Strategy (主模式)
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "swing"
        type: choice
        options:
          - swing
          - morning
          - midday
          - close
          - auto
      publish_target:
        description: "Publish target"
        required: true
        default: "feishu"
        type: choice
        options:
          - feishu
          - telegram

jobs:
  run-sentinel:
    runs-on: ubuntu-latest

    # Permission to commit back to repo
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Sentinel (Auto Detect Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_MODE: ${{ github.event.inputs.mode || 'auto' }}
          PUBLISH_TARGET: ${{ github.event.inputs.publish_target || 'feishu' }}
          SCHEDULE_EXPR: ${{ github.event.schedule || '' }}
        run: |
          if [ -n "$WORKFLOW_MODE" ] && [ "$WORKFLOW_MODE" != "auto" ]; then
            TARGET_MODE="$WORKFLOW_MODE"
            echo "Manual dispatch mode selected: $TARGET_MODE"
          else
            case "$SCHEDULE_EXPR" in
              "10 0 * * 1-5")
                TARGET_MODE="morning"
                ;;
              "50 3 * * 1-5")
                TARGET_MODE="midday"
                ;;
              "20 7 * * 1-5")
                TARGET_MODE="close"
                ;;
              "35 7 * * 1-5")
                TARGET_MODE="swing"
                ;;
              *)
                current_hour=$(date -u +%-H)
                echo "Current UTC Hour: $current_hour"
                if [ "$current_hour" -lt 2 ]; then
                  TARGET_MODE="morning"
                elif [ "$current_hour" -lt 6 ]; then
                  TARGET_MODE="midday"
                elif [ "$current_hour" -lt 8 ]; then
                  TARGET_MODE="close"
                else
                  TARGET_MODE="swing"
                fi
                ;;
            esac
          fi

          echo "Resolved mode: $TARGET_MODE"
          echo "Publish target: $PUBLISH_TARGET"

          if python -m src.utils.trading_calendar --mode "$TARGET_MODE" --publish; then
            python -m src.main --mode "$TARGET_MODE" --publish --publish-target "$PUBLISH_TARGET"
          else
            status=$?
            if [ "$status" -eq 78 ]; then
              echo "Skip run: non-trading day"
              exit 0
            fi
            exit "$status"
          fi

      - name: Commit Database Changes (Persistence)
        # Only commit if we are not in a PR and the run succeeded
        if: success()
        run: |
          git config --global user.name 'Sentinel Bot'
          git config --global user.email 'bot@sentinel.ai'

          # Add the DB file (Make sure it is NOT in .gitignore if you use this method!)
          # Or force add it
          git add -f data/sentinel.db

          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Update market data: $(date +'%Y-%m-%d')"
            git push
          fi

    2. `Yesterday_Plan`: 昨日计划（如有）
    3. `Signal_Track_Record`: 信号跟踪结果（如有）
    </input_spec>

    <execution_rules>
    1. 这是一份**尾盘执行清单**，不是午盘复盘，不要写宏大叙事。
    2. 每只持仓必须覆盖，且明确归类为：
       - 继续持有
       - 尾盘减仓
       - 可选加仓
       - 今日不动
    3. `actions[].operation` 必须包含建议比例区间，或明确写“今日不动”。
    4. 每个方向性判断都要给出一个**失效条件**，写进 `reason`。

    name: "电力ETF"
    strategy: "trend"
    priority: "medium"

  - code: "512200"
    name: "地产ETF"
    strategy: "trend"
    priority: "low"

risk_management:
  strategies:
    trend:
      stop_loss_pct: -0.05
    value:
      stop_loss_pct: -0.08
  ma_window: 20
  # Bias thresholds for tiered signal generation (v2.0)
  bias_thresholds:
    watch: -0.01 # -1%
    warning: -0.03 # -3%
    danger: -0.05 # -5%
    overbought: 0.05 # +5%
  volume_ratio_high: 1.5 # 放量判定阈值
  technical_indicators:
    macd:
      fast_period: 12
      slow_period: 26
      signal_period: 9
    rsi:
      period: 14
      oversold: 30 # RSI < 30 超卖
      overbought: 70 # RSI > 70 超买
    bollinger:
      window: 20
      num_std: 2
    history_days: 60 # K线获取天数（MACD需要更多数据）

  # Signal rules: first-match-wins. Order matters — put higher-priority overrides first.
  # Available flags: MACD_BULLISH, MACD_BEARISH, MACD_GOLDEN_CROSS, MACD_WEAK,
  #   MACD_BOTTOM_DIV, MACD_TOP_DIV, OBV_INFLOW, OBV_OUTFLOW,
  #   VOLUME_SHRINK (<1.0), VOLUME_HIGH (>1.5), VOLUME_CONTINUOUS_SHRINK,
  #   RSI_OVERBOUGHT, RSI_OVERSOLD, RSI_WEAK, RSI_BB_OVERBOUGHT,
  #   BB_BELOW_LOWER, BB_ABOVE_UPPER,
  #   KDJ_OVERSOLD, KDJ_OVERBOUGHT, KDJ_OVERSOLD_GOLDEN, KDJ_OVERBOUGHT_DEATH,
  #   ATR_HIGH_VOLATILE, ATR_LOW_VOLATILE
  signal_rules:
    # === 买入侧规则（条件更严格，优先匹配） ===
    - name: "底背驰反转触底"
      triggers: ["DANGER", "WARNING"]
      conditions_all: ["MACD_BOTTOM_DIV", "VOLUME_SHRINK", "OBV_INFLOW"]
      conditions_any: []
      result: "OPPORTUNITY"
      confidence: "高"
    - name: "超卖金叉反转"
      triggers: ["DANGER", "WARNING"]
      conditions_all: ["KDJ_OVERSOLD_GOLDEN", "OBV_INFLOW"]
      conditions_any: []
      result: "OPPORTUNITY"
      confidence: "高"
    # === 原有降级规则 ===
    - name: "底背驰洗盘降级"
      triggers: ["DANGER"]
      conditions_all: ["MACD_BOTTOM_DIV", "VOLUME_SHRINK"]
      conditions_any: []
      result: "WATCH"
      confidence: "高"
    - name: "多头回调抵抗"
      triggers: ["WARNING"]
      conditions_all: []
      conditions_any: ["MACD_BULLISH", "MACD_BOTTOM_DIV"]
      result: "WATCH"
      confidence: "中"
    - name: "弱势共振下杀"
      triggers: ["WARNING"]
      conditions_all: ["MACD_WEAK", "OBV_OUTFLOW"]
      conditions_any: []
      result: "DANGER"
      confidence: "高"
    # === 多头买入侧规则 ===
    - name: "放量突破加仓"
      triggers: ["SAFE"]
      conditions_all: ["MACD_GOLDEN_CROSS", "VOLUME_HIGH", "OBV_INFLOW"]
      conditions_any: []
      result: "OPPORTUNITY"
      confidence: "高"
    - name: "多头蓄势加仓"
      triggers: ["SAFE"]
      conditions_all: ["MACD_BULLISH", "OBV_INFLOW", "ATR_LOW_VOLATILE"]
      conditions_any: []
      result: "ACCUMULATE"
      confidence: "中"
    # === 原有 SAFE 调整规则 ===
    - name: "顶背离超买"
      triggers: ["SAFE"]
      conditions_all: []
      conditions_any: ["RSI_BB_OVERBOUGHT", "MACD_TOP_DIV"]
      result: "OVERBOUGHT"
      confidence: "高"
    - name: "多头共振"
      triggers: ["SAFE"]
      conditions_all: ["MACD_BULLISH", "OBV_INFLOW"]
      conditions_any: []
      result: "SAFE"
      confidence: "高"
    - name: "空头初现"
      triggers: ["SAFE"]
      conditions_all: ["MACD_BEARISH"]
      conditions_any: []
      result: "SAFE"
      confidence: "低"
    # === 水下买入侧规则 ===
    - name: "水下底背驰加仓"
      triggers: ["WATCH", "OBSERVED"]
      conditions_all: ["MACD_BOTTOM_DIV", "OBV_INFLOW"]
      conditions_any: []
      result: "ACCUMULATE"
      confidence: "高"
    - name: "超卖企稳加仓"
      triggers: ["WATCH", "OBSERVED"]
      conditions_all: ["KDJ_OVERSOLD", "VOLUME_CONTINUOUS_SHRINK"]
      conditions_any: []
      result: "ACCUMULATE"
      confidence: "中"
    # === 原有水下规则 ===
    - name: "弱势金叉"
      triggers: ["WATCH", "OBSERVED"]
      conditions_all: ["MACD_GOLDEN_CROSS", "RSI_WEAK"]
      conditions_any: []
      result: "" # 空字符串代表不修改 signal
      confidence: "低"
    - name: "空头共振"
      triggers: ["WATCH", "OBSERVED"]
      conditions_all: ["MACD_BEARISH", "OBV_OUTFLOW"]
      conditions_any: []
      result: ""
      confidence: "高"
    - name: "水下底背驰"
      triggers: ["WATCH", "OBSERVED"]
      conditions_all: ["MACD_BOTTOM_DIV"]
      conditions_any: []
      result: ""
      confidence: "高"
    - name: "超卖金叉企稳"
      triggers: ["DANGER", "WARNING"]
      conditions_all: ["KDJ_OVERSOLD_GOLDEN", "VOLUME_SHRINK"]
      conditions_any: []
      result: "WATCH"
      confidence: "高"
    - name: "超买死叉见顶"
      triggers: ["SAFE", "OVERBOUGHT"]
      conditions_all: ["KDJ_OVERBOUGHT_DEATH"]
      conditions_any: ["MACD_TOP_DIV", "OBV_OUTFLOW"]
      result: "OVERBOUGHT"
      confidence: "高"
    - name: "高波动缩量洗盘"
      triggers: ["DANGER", "WARNING"]
      conditions_all: ["ATR_HIGH_VOLATILE", "VOLUME_CONTINUOUS_SHRINK"]
      conditions_any: []
      result: "WATCH"
      confidence: "中"

  # NOTE: north_money_threshold removed - no longer real-time available

# 市场异动预警配置
alert:
  enabled: true
  thresholds:
    price_change_pct: 3.0    # 日内涨跌幅超过此值触发预警 (%)
    volume_ratio: 1.5        # 量比超过此值触发预警 (当前成交量 / 5日均量)
    turnover_rate: 8.0       # 换手率超过此值触发预警 (%)
  # 预警严重程度阈值
  severity:
    sharp_move:
      warning: 3.0           # 涨跌幅 >= 3% 为 warning
      alert: 4.0             # >= 4% 为 alert
      critical: 5.0          # >= 5% 为 critical
    volume_spike:
      warning: 1.5           # 量比 >= 1.5x 为 warning
      alert: 2.0             # >= 2x 为 alert
      critical: 3.0          # >= 3x 为 critical
  # 同类型同级别异动每天只推送一次（去重）
  dedup: true

# 智能信息雷达配置
radar:
  enabled: true
  # 行业新闻关注的赛道和关键词
  sectors:
    AI: ["人工智能", "AI", "大模型", "GPT", "机器人", "自动驾驶"]
    半导体: ["半导体", "芯片", "GPU", "EDA", "光刻机"]
    新能源: ["新能源", "光伏", "锂电池", "储能", "电动车"]
  # 政策监控关键词（可选，留空使用默认）
  policy_keywords: []  # 默认: 证监会、央行、国务院、发改委、财政部等
  # GitHub Trending 关注的语言
  github_languages: ["python", "typescript", "rust", "go"]
  # 每日推送时间（24小时制）
  push_times: ["08:00", "12:00", "18:00"]

prompts:
  midday_focus: |
    # System Prompt: A股日内高频量化分析师 (AI-QA v2.0)

    <role>
    你是一线高频交易（HFT）团队的**首席量化策略师**，精通A股微观结构。在北向资金不再实时披露的背景下，你极度擅长通过**量价关系（Volume-Price Analysis）**和**板块效应**来推演主力意图。
    </role>

    <style>
    *   **语调**: 极度理性、风险厌恶、机构视角。
    *   **原则**: 宁可踏空，绝不套牢。**”缩量回调是洗盘，放量破位是出货”**是你铁的纪律。
    *   **输出**: 结论先行，逻辑闭环。
    </style>

    <tone_guardrails>
    **禁止使用以下类别词汇**（违反将导致输出无效）：
    - 恐慌性术语：断头铡刀、连环踩踏、崩盘、暴雷、血洗、灭顶之灾
    - 绝对化判断：极高概率、必然、一定会、坚决看空/看多、毋庸置疑
    - 操纵暗示：诱多、诱空、骗线、主力出货、割韭菜、庄家洗盘
    - 煽动性号召：满仓、抄底、梭哈、All-in、清仓跑路

    **必须遵守的表达规范**：
    1. 所有方向性判断必须附带概率区间（如”60%-70%概率回调”），不得使用”极高概率””大概率”等模糊绝对化表述
    2. 每个看空/看多判断必须附带一句反面情景（如”若放量站稳MA20则上述看空判断失效”）
    3. 减仓/加仓建议必须附带建议比例区间（如”建议减仓30%-50%”）
    4. 技术指标信号（如顶背驰）描述为”风险提示”而非”确定性结论”
    5. 当 OBV 流入与 MACD 顶背驰矛盾时，必须明确指出这一矛盾并降低判断置信度
    </tone_guardrails>

    <input_spec>
    你将接收一个 JSON 对象（注：由于市场规则变更，部分字段需特殊处理）：
    1.  `Market_Breadth`: 涨跌家数比（核心情绪指标）。
    2.  `North_Money`: **已失效或仅作为参考**（不再具备盘中实时指引意义，请降低其权重，转而关注下方个股的成交量变动）。
    3.  `Portfolio`: 持仓列表（含现价、MA20、乖离率、MACD趋势、RSI、布林带位置、技术摘要 `Tech`、置信度 `Confidence`、新闻）。
    4.  `Indices`: (隐含) 如果有大盘指数数据，结合判断市场水位。
    5.  `Yesterday_Plan`: 昨日计划。
    6.  `Signal_Track_Record`: 系统信号历史命中率和昨日信号验证结果（如有）。
    </input_spec>

    <logic_core>
    你必须执行以下 **v2.0 增强版** 逻辑管道：

    1.  **市场体温 (Market Context)**:
        *   **情绪定调**: 涨跌比是核心。若普跌（下跌家数>4000），除非个股有独立重大利好，否则一律视为系统性风险，建议 `STOP_LOSS` 或 `WATCH`。
        *   **量能校验**: 
            *   大盘缩量下跌 -> 买盘不足，阴跌风险 -> 谨慎。
            *   大盘放量下跌 -> 恐慌盘涌出 -> 极度危险 (`DANGER`)。
            *   大盘放量上涨 -> 资金进场 -> 安全 (`SAFE`)。

    2.  **个股信号生成 (Signal Logic)**:
        *   **趋势判定 (MA20)**: 
            *   **ETF/蓝筹**: 严格遵守 `Price < MA20` 离场原则。
            *   **高波个股 (如紫金/盛达)**: 允许 `Price` 瞬间刺破 `MA20` (假摔)，需结合 **-3%** 阈值或 **缩量** 确认。
        *   **真假摔过滤器 (Volume & OBV Filter)**:
            *   **CASE A (洗盘回踩)**: 股价跌破 MA20，但成交量显著萎缩，且 **OBV资金平衡或流入**，或出现 **MACD底背驰** -> 判定为**洗盘假摔** -> 建议 `WATCH` (观察能否收回)。
            *   **CASE B (放量击穿)**: 股价跌破 MA20，且成交量放大，且 **OBV资金流出**，MACD呈现**杀多棒/超弱** -> 判定为**真实破位** -> 建议 `DANGER` (立即减仓/止损)。
            *   **CASE C (上涨中继)**: 股价在 MA20 上方震荡，MACD多头且OBV流入 -> 建议 `HOLD`。
            *   **CASE D (MA20支撑回踩)**: 乖离率在 -1%~+2% 区间（MA20附近），成交量萎缩，且 OBV资金流入或持平 -> 判定为**趋势回踩** -> 建议 `ACCUMULATE`（加仓10%-20%）。若次日放量跌破MA20则加仓判断失效。
            *   **CASE E (底部反转)**: 股价跌破MA20，但出现 **MACD底背驰** + 量能干枯（连续缩量）+ **OBV资金流入** + **KDJ超卖金叉** -> 判定为**底部反转信号** -> 建议 `OPPORTUNITY`（分批建仓20%-30%）。若次日放量跌破前低则反转判断失效。
            *   **CASE F (放量突破)**: 股价从下方突破MA20，量比>1.5，且 **MACD金叉** + **OBV资金流入** -> 判定为**放量突破** -> 建议 `OPPORTUNITY`（加仓20%-30%）。若次日缩量回落MA20下方则突破判断失效。
        *   **板块共振**:
            *   若个股跌，但所属板块（如有色、电力）整体强势 -> 错杀机会 -> `WATCH/BUY`。
            *   若个股跌，且板块不仅跌还领跌市场 -> 还要跌 -> `DANGER`。
        *   **多维交叉验证 (Cross Validation)**:
            *   系统已将多维技术指标（MACD/OBV/KDJ/RSI/ATR/布林带/量能）结构化为标准标签序列（如 `[日线_MACD_多头_无背驰_0]`, `[日线_KDJ_超卖_0]`等），附在 `Tech` 字段中。
            *   `Confidence` 字段反映多维指标一致性（高=多维共振，中=部分矛盾，低=信号冲突）。
            *   **必须优先寻找 Tech 字段里的 `[底背驰]` 或 `[顶背驰]` 标记。底背驰往往是极佳的买点或确认洗盘的信号。**
            *   **KDJ 灵敏度**：`[日线_KDJ_超卖_0]` 出现且伴随缩量，说明短期企稳概率极高；`[日线_KDJ_超卖金叉_0]` 是极强的短期反弹买点信号；`[日线_KDJ_超买死叉_0]` 则警示短期见顶。
            *   **ATR 波幅**：`[日线_ATR_高波动_0]` 提示当前处于剧烈震荡宽幅洗盘期，切莫追涨杀跌。
            *   布林带下半区 + 极度缩量 = 洗盘概率极高。

    3.  **消息面修正**:
        *   对于 紫金/盛达/黄金ETF，必须隐含考虑 **美元指数/黄金期货** 的走势影响（根据常识判断，无需外部输入）。

    4.  **自我校准 (Self-Calibration)**:
        *   参考 `Signal_Track_Record` 中的命中率数据。
        *   如果某信号类型近期命中率低，给出该信号时需更谨慎。
        *   如果高置信度命中率 > 80%，可更果断地执行高置信度信号。
        *   在 reason 中适当引用命中率数据增强说服力。

    </logic_core>

    <thinking_process_protocol>
    在生成 JSON 前，必须在 Markdown 引用块中打印 **策略运算日志**：
    1.  **宏观扫描**: 今天的市场是“杀估值”（大票跌）还是“杀情绪”（小票跌）？
    2.  **量价与能量微雕**: 扫描破位个股的 Tech 摘要，有无 `[底背驰]` 结构？OBV能量是流入还是流出？缩量假摔还是放量真跌？
    2.5 **机会识别**: 扫描所有个股，有无底背驰+缩量+OBV流入的底部反转结构？有无KDJ超卖金叉？有无放量突破MA20？这些是加仓机会信号（OPPORTUNITY/ACCUMULATE）。
    3.  **博弈推演**: “如果下午不收回MA20，这只票的技术形态是否彻底破坏？”
    4.  **最终裁决**: 根据上述多维交叉得出 DANGER/WATCH/HOLD/SAFE/OPPORTUNITY/ACCUMULATE。
    </thinking_process_protocol>

    <output_format>
    返回 JSON 对象（严禁 Markdown 代码块，`actions` 必须覆盖所有持仓）。字段语义如下：
    - `market_sentiment`: 情绪分层，如冰点/分歧/修复/高潮
    - `volume_analysis`: 量能结论，如放量滞涨/缩量阴跌/放量突破/无量空跌
    - `macro_summary`: 基于量价和情绪的午间复盘，约100字
    - `bull_case`: 不少于50字的看多论述，必须引用具体的 OBV/MACD/KDJ 证据
    - `bear_case`: 不少于50字的看空论述，必须引用具体的技术指标证据
    - `actions[].code`: 标的代码
    - `actions[].name`: 标的名称
    - `actions[].signal`: DANGER/WARNING/WATCH/OBSERVED/SAFE/OVERBOUGHT/OPPORTUNITY/ACCUMULATE/LIMIT_UP/LIMIT_DOWN
    - `actions[].action`: DANGER/WATCH/HOLD/BUY/OPPORTUNITY/ACCUMULATE
    - `actions[].operation`: 具体操作，必须包含仓位比例
    - `actions[].reason`: 必须包含量/价/线/指标四要素，且指出指标矛盾
    - `actions[].news_impact`: 消息面对判断的修正

    **信号说明**:
    - DANGER: 跌破MA20且放量，建议止损
    - WARNING: 跌破MA20但缩量，警惕但可观察
    - WATCH: 轻微破位(-1%~-3%)，等待确认
    - OBSERVED: 刚触及MA20(-1%以内)，密切关注
    - SAFE: MA20上方运行，安全持有
    - OVERBOUGHT: 乖离率超+5%，警惕回调
    - OPPORTUNITY: 底部反转或放量突破信号，建议分批加仓20%-30%
    - ACCUMULATE: MA20支撑回踩或超卖企稳，建议温和加仓10%-20%
    - LIMIT_UP: 涨停锁定，无法买入
    - LIMIT_DOWN: 跌停锁定，无法卖出
    </output_format>

    <user_instruction>
    等待市场数据...
    </user_instruction>


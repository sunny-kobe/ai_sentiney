system:
  log_level: INFO
  retry_count: 3
  timeout_seconds: 10
  timezone: "Asia/Shanghai"
  # Optional: Proxy URL (e.g., http://127.0.0.1:7890)
  # proxy: "http://127.0.0.1:7890"

ai:
  model_name: "gemini-3.1-pro-preview"
  # MiMo 主力模型（OpenAI 兼容接口）
  mimo:
    enabled: true
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    api_key: "${MIMO_API_KEY}"
    model: "mimo-v2.5-pro"

strategy:
  default_mode: "swing"
  swing:
    risk_profile: "aggressive"
    windows: [10, 20, 40]
    action_labels: ["增配", "持有", "减配", "回避", "观察"]
    primary_metrics: ["平均收益", "平均超额", "平均回撤"]
    positioning: "以2-8周中期持仓调整为主，midday/close 只做战术诊断"
    candidate_limit: 3
    max_watchlist_adds_per_day: 2
    max_single_position: 0.25
    max_total_exposure: 0.95
    min_cash_buffer: 0.05
    max_satellite_positions: 5

api_keys:
  # Using env vars is recommended, but supporting config file for ease of use in local env
  gemini_api_key: "${GEMINI_API_KEY}"
  feishu_webhook: "${FEISHU_WEBHOOK}"
  telegram_bot_token: "${TELEGRAM_BOT_TOKEN}"
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"

portfolio_state:
  cash_balance: 33091.73
  lot_size: 100

portfolio:
  - code: "510500"
    name: "中证500ETF"
    cost: 6.293
    shares: 1500
    strategy: "trend"

  - code: "512480"
    name: "半导体ETF"
    cost: 0.780
    shares: 4200
    strategy: "trend"

  - code: "563300"
    name: "中证2000ETF"
    cost: 0.417
    shares: 5200
    strategy: "trend"

